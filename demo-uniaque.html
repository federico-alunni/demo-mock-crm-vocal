<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Voice Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #05050a;
      --surface: #0e0e18;
      --accent: #c8ff00;
      --accent2: #00d4ff;
      --text: #f0f0f0;
      --muted: #555570;
      --border: rgba(200,255,0,0.12);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
    }

    .mesh {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 70% 60% at 10% 10%, rgba(200,255,0,0.07) 0%, transparent 65%),
        radial-gradient(ellipse 60% 70% at 90% 85%, rgba(0,212,255,0.05) 0%, transparent 65%),
        radial-gradient(ellipse 50% 50% at 50% 50%, rgba(120,0,255,0.04) 0%, transparent 65%);
    }

    .grid-bg {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(200,255,0,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(200,255,0,0.025) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    .scan {
      position: fixed; top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0.35;
      animation: scan 10s linear infinite;
      z-index: 2; pointer-events: none;
    }

    .wrapper {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 1.2rem 2.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      animation: fadeDown 0.7s ease both;
      flex-shrink: 0;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.1rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .badge {
      display: flex; align-items: center; gap: 0.5rem;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      border: 1px solid rgba(200,255,0,0.2);
      padding: 0.3em 0.9em;
      border-radius: 2px;
    }

    .badge::before {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      animation: blink 2s ease-in-out infinite;
    }

    .hero-strip {
      padding: 1.8rem 2.5rem 0;
      text-align: center;
      flex-shrink: 0;
      animation: fadeUp 0.8s 0.1s ease both;
    }

    .eyebrow {
      font-size: 0.62rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.5rem;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(1.5rem, 3.5vw, 2.6rem);
      line-height: 1.05;
      letter-spacing: -0.02em;
    }

    h1 em {
      font-style: normal;
      color: transparent;
      -webkit-text-stroke: 1px var(--accent);
    }

    .widget-zone {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1.5rem 2rem;
      animation: fadeUp 0.9s 0.25s ease both;
      min-height: 0;
    }

    .widget-label {
      font-size: 0.6rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    .widget-frame {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2.5rem;
      backdrop-filter: blur(24px);
      box-shadow:
        0 0 0 1px rgba(200,255,0,0.05),
        0 0 80px rgba(200,255,0,0.04),
        0 30px 90px rgba(0,0,0,0.65),
        inset 0 1px 0 rgba(255,255,255,0.04);
      width: min(900px, 96vw);
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      justify-content: stretch;
      position: relative;
      overflow: hidden;
    }

    .widget-frame::before,
    .widget-frame::after {
      content: '';
      position: absolute;
      width: 24px; height: 24px;
      border-color: var(--accent);
      border-style: solid;
      opacity: 0.35;
    }
    .widget-frame::before {
      top: 14px; left: 14px;
      border-width: 1px 0 0 1px;
    }
    .widget-frame::after {
      bottom: 14px; right: 14px;
      border-width: 0 1px 1px 0;
    }

    .widget-glow {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 60% 40% at 50% 50%, rgba(200,255,0,0.04), transparent 70%);
      pointer-events: none;
    }

    elevenlabs-convai {
      position: relative; z-index: 1;
      width: 100%;
      flex: 1;
      display: block;
      min-height: 0;
    }

    /* force shadow DOM content to fill parent */
    elevenlabs-convai::part(container),
    elevenlabs-convai > * {
      width: 100% !important;
      height: 100% !important;
    }

    .stats {
      display: flex;
      gap: clamp(1.5rem, 5vw, 4rem);
      padding: 1.2rem 2.5rem;
      flex-shrink: 0;
      animation: fadeUp 0.9s 0.4s ease both;
      justify-content: center;
    }

    .stat { text-align: center; }

    .stat-val {
      font-family: 'Syne', sans-serif;
      font-size: clamp(1.1rem, 2vw, 1.5rem);
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
    }

    .stat-lbl {
      font-size: 0.55rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 0.3rem;
    }

    footer {
      padding: 1rem 2.5rem;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.8rem;
      flex-shrink: 0;
      animation: fadeDown 0.7s 0.5s ease both;
    }

    .footer-copy {
      font-size: 0.6rem;
      color: var(--muted);
      letter-spacing: 0.1em;
    }

    .footer-links { display: flex; gap: 1.5rem; }

    .footer-links a {
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    .footer-links a:hover { color: var(--accent); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes scan {
      0%   { top: -2px; opacity: 0; }
      5%   { opacity: 0.35; }
      95%  { opacity: 0.35; }
      100% { top: 100vh; opacity: 0; }
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    @media (max-width: 600px) {
      header, footer { padding: 1rem 1.2rem; }
      .hero-strip { padding: 1.2rem 1.2rem 0; }
      .widget-zone { padding: 1rem; }
      .widget-frame {
        height: calc(100vh - 300px);
        min-height: 360px;
        padding: 1.5rem 1rem;
        border-radius: 14px;
      }
      .stats { gap: 1.5rem; padding: 1rem 1.2rem; }
    }
  </style>
</head>
<body>
  <div class="mesh"></div>
  <div class="grid-bg"></div>
  <div class="scan"></div>

  <div class="wrapper">

    <header>
      <div class="logo">VoiceAI</div>
      <div class="badge">Sistema attivo</div>
    </header>

    <div class="hero-strip">
      <p class="eyebrow">Intelligenza vocale in tempo reale</p>
      <h1>Parla con <em>l'AI</em> del futuro</h1>
    </div>

    <div class="widget-zone">
      <span class="widget-label">Avvia la conversazione</span>
      <div class="widget-frame">
        <div class="widget-glow"></div>
        <elevenlabs-convai agent-id="agent_1401khp62pcqf03v4qvz055s7bbd" server-location="eu-residency"></elevenlabs-convai>
        <script src="https://unpkg.com/@elevenlabs/convai-widget-embed" async type="text/javascript"></script>
      </div>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="stat-val">&lt;1s</div>
        <div class="stat-lbl">Latenza</div>
      </div>
      <div class="stat">
        <div class="stat-val">EU</div>
        <div class="stat-lbl">Server</div>
      </div>
      <div class="stat">
        <div class="stat-val">24/7</div>
        <div class="stat-lbl">Disponibile</div>
      </div>
    </div>

    <footer>
      <span class="footer-copy">© 2025 VoiceAI — Powered by ElevenLabs</span>
      <div class="footer-links">
        <a href="#">Privacy</a>
        <a href="#">Termini</a>
        <a href="#">Contatti</a>
      </div>
    </footer>

  </div>
</body>
</html>
