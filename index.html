<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM Demo Navigation</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        h1 {
            color: #333;
            margin-bottom: 2rem;
        }
        .nav-container {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        .nav-button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 8px;
            font-size: 1.1rem;
            text-decoration: none;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .nav-button:hover {
            background-color: #0056b3;
            transform: translateY(-2px);
        }
        .nav-button.dark {
            background-color: #343a40;
        }
        .nav-button.unique {
            background-color: #dc3545;
        }
    </style>
</head>
<body>
    <h1>Select Demo Page</h1>
    <div class="nav-container">
        <a href="crm-unified.html" class="nav-button" style="background-color:#6366f1">Unified CRM + AI</a>
        <a href="crm-light.html" class="nav-button">Light CRM</a>
        <a href="crm-dark.html" class="nav-button dark">Dark CRM</a>
        <a href="demo-uniaque.html" class="nav-button unique">Demo Uniacque</a>
    </div>
</body>
</html>
